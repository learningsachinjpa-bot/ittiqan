name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  frontend:
    name: Frontend — TypeScript + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build (Vite)
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000
          VITE_GOOGLE_CLIENT_ID: placeholder

  backend:
    name: Backend — Python syntax + imports
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Python syntax check
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/test
          SECRET_KEY: deadbeefdeadbeefdeadbeefdeadbeef00000000000000000000000000000000
          ENCRYPTION_KEY: deadbeefdeadbeefdeadbeefdeadbeef00000000000000000000000000000000
          GOOGLE_CLIENT_ID: placeholder.apps.googleusercontent.com
        run: python -m py_compile main.py app/routers/*.py app/models/*.py app/core/*.py app/services/*.py

      - name: Import check (all routers)
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/test
          SECRET_KEY: deadbeefdeadbeefdeadbeefdeadbeef00000000000000000000000000000000
          ENCRYPTION_KEY: deadbeefdeadbeefdeadbeefdeadbeef00000000000000000000000000000000
          GOOGLE_CLIENT_ID: placeholder.apps.googleusercontent.com
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from app.routers import auth, organizations, agents, datasets
          from app.routers import evaluations, security, llm_providers
          from app.routers import observability, schedules, reliability, health
          print('All router imports OK')
          "

  qa-scanner:
    name: QA Scanner (Gates 0–2)
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Install backend deps
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run QA scanner (Gates 0-2)
        run: python qa.py
        # qa.py exits 1 if any CRITICAL or HIGH issues found
